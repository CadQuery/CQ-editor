name: Test Linux

on: [push, pull_request]

jobs:
  test-linux:
    name: Test Linux
    runs-on: ubuntu-22.04
    steps:
      - name: "Check out the repo"
        uses: actions/checkout@v3
        with:
          submodules: true
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update && sudo apt install -y libgl1 libglx-mesa0 libgl1-mesa-dri libglu1-mesa libegl1-mesa mesa-utils libopengl0 fontconfig fonts-dejavu-core

      - name: Install packages
        run: |
          pip install -e .
          pip install .[test]
          pip list

      - name: Run tests
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          QT_OPENGL: "software"
          QT_QPA_PLATFORM: "minimal"
          QT_XCB_GL_INTEGRATION: "none"
        uses: coactions/setup-xvfb@v1.0.1
        with:
          run: pytest
